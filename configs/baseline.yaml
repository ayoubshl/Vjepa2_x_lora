# ============================================================
# Baseline: frozen V-JEPA 2 encoder +  probe.
# ============================================================

experiment_name: baseline_frozen

# Encoder treatment: frozen, no LoRA
use_lora:  false
use_qlora: false

# Probe AttentiveClassifier with 3 query tokens
probe:
  depth:        4       # paper: 4 transformer blocks
  num_heads:    16      # paper: 16 attention heads
  num_queries:  3       # verb, noun, action
  mlp_ratio:    4.0
  dropout:      0.0     # paper uses 0; our ablation can try 0.1

# Loss — paper uses focal loss on each head
loss:
  type:     focal       # 'focal' or 'ce'
  gamma:    2.0
  w_verb:   1.0
  w_noun:   1.0
  w_action: 1.0

# Optimizer
optimizer:
  lr:                 1.0e-4   # higher LR ok since only probe trains
  weight_decay:       0.05
  warmup_fraction:    0.05      # 5% of total steps
  max_grad_norm:      1.0

# Training
training:
  batch_size:   8                # frozen encoder → less memory needed
  num_epochs:   10               # over the full fixed training set
  use_bf16:     true
  eval_at_end:  true             # full mR@5 evaluation at end of training
  eval_mid_training: true        # also at midpoint, to track learning curve
