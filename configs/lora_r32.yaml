# ============================================================
# LoRA r=32: heaviest adapter
# ============================================================

experiment_name: lora_r32

# Model
use_lora: true
lora_r: 32
lora_alpha: 64
lora_dropout: 0.1
lora_target_modules: ["query", "value"]

# Probe
probe_layers: 2
probe_heads: 8
probe_dropout: 0.1

# Training
batch_size: 4
lr: 5e-5
weight_decay: 0.05
epochs_per_participant: 3
warmup_steps: 500
max_grad_norm: 1.0
use_bf16: true

# Loss weights
w_verb: 1.0
w_noun: 1.0
w_action: 1.0

# Evaluation
eval_every_n_epochs: 1