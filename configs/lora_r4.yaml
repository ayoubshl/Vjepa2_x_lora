# ============================================================
# LoRA r=4 — lightest adapter
# Same probe / loss / data as baseline. Only encoder treatment
# differs: query+value projections get rank-4 LoRA adapters.
# ============================================================

experiment_name: lora_r4

use_lora:  true
use_qlora: false

# LoRA hyperparameters
lora:
  r:               4
  alpha:           8       
  dropout:         0.1
  target_modules:  ["query", "value"]
  bias:            "none"
  # Upper-layers-only mode:
  upper_layers_only: false
  num_upper_layers:  6       

probe:
  depth:        4
  num_heads:    16
  num_queries:  3
  mlp_ratio:    4.0
  dropout:      0.0

loss:
  type:     focal
  gamma:    2.0
  w_verb:   1.0
  w_noun:   1.0
  w_action: 1.0

optimizer:
  lr:                 5.0e-5   # lower than baseline; LoRA + pretrained weights
  weight_decay:       0.05
  warmup_fraction:    0.05
  max_grad_norm:      1.0

training:
  batch_size:   4              # LoRA needs more memory than frozen
  num_epochs:   10
  use_bf16:     true
  eval_at_end:  true
  eval_mid_training: true
