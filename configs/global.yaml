# ============================================================
# Global config — shared across all experiments
# Paths and dataset-level constants. Experiment YAMLs override
# only experiment-specific fields.
# ============================================================

# Paths
paths:
  project_dir:      .
  videos_dir:       videos          # raw MP4 files
  annotations_dir:  annotations
  train_csv:        annotations/EPIC_100_train.csv
  val_csv:          annotations/EPIC_100_validation.csv
  participants_file: participants.txt   # fixed subset list
  checkpoints_dir:  checkpoints
  predictions_dir:  predictions     # raw logits per experiment
  results_dir:      results
  vocabulary_path:  vocabulary.json
  annotation_cache_dir: annotation_cache  # parsed CSV pickles

# V-JEPA 2 model
# Hidden sizes are read from model.config at runtime
model:
  hf_repo: facebook/vjepa2-vitl-fpc64-256

# frame sampling 
dataset:
  fps_source:           60      # EK-100 native frame rate
  fps_target:           8       
  num_frames:           32      
  anticipation_seconds: 1.0     # context ends 1 second before action
  resolution:           256     # ViT-L is fpc64-256
  num_verb_classes:     97      # EK-100
  num_noun_classes:     300     # EK-100

# Hardware
runtime:
  device:        cuda:0
  num_workers:   4       # Decord DataLoader workers; 
  seed:          42     
  deterministic: false   
# wandb
wandb:
  project: vjepa2-x-lora
  entity:  null          # set to your wandb username if needed
